[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/ai-router"
  to = "/.netlify/functions/ai-router"
  status = 200

[[redirects]]
  from = "/api/stripe-checkout"
  to = "/.netlify/functions/stripe-checkout"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/log-violation"
  to = "/.netlify/functions/log-violation"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
